<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>QUIC WebTransport Demo</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    canvas { display: block; margin-top: 12px; border: 1px solid #ccc; background: #000; }
    pre { margin-top: 12px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>QUIC WebTransport Demo</h1>

  <p>Status: <span id="status">Not connected</span></p>

  <button id="connectBtn">Connect</button>
  <button id="sendBtn" disabled>Send Message</button>
  <button id="startCameraBtn" disabled>Start Camera</button>
  <button id="stopCameraBtn" disabled>Stop Camera</button>

  <div style="display:flex; gap:24px; flex-wrap:wrap; margin-top:12px;">
    <div>
      <p style="margin:0 0 4px; font-weight:bold;">File Playback</p>
      <canvas id="videoCanvas" width="640" height="480"></canvas>
    </div>
  </div>

  <div style="display:flex; gap:24px; flex-wrap:wrap; margin-top:24px;">
    <div>
      <p style="margin:0 0 4px; font-weight:bold;">Camera Capture</p>
      <video id="cameraPreview" width="640" height="480" autoplay muted playsinline
             style="display:block; border:1px solid #ccc; background:#111;"></video>
    </div>
    <div>
      <p style="margin:0 0 4px; font-weight:bold;">QUIC Relayed Video</p>
      <canvas id="relayCanvas" width="640" height="480"></canvas>
    </div>
  </div>

  <pre id="log"></pre>

  <script src="client.js"></script>
</body>
</html>
